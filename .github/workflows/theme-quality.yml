name: 主题包质量门禁

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  quality:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: 检出仓库
        uses: actions/checkout@v4
      - name: 配置 Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22.16.0'
      - name: 执行完整构建与校验
        run: npm run check
      - name: 检查未提交的生成差异
        run: git diff --exit-code
